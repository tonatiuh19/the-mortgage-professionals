      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, trigger_event]
              properties:
                name: { type: string }
                trigger_event: { type: string }
                description: { type: string }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      flow: { type: object }

  /reminder-flows/{flowId}:
    get:
      tags: [Reminder Flows]
      summary: Get a single reminder flow with full step/node data
      security:
        - BrokerAuth: []
      parameters:
        - in: path
          name: flowId
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Flow detail
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      flow: { type: object }
    put:
      tags: [Reminder Flows]
      summary: Save (overwrite) a full reminder flow including nodes/edges
      description: |
        Replaces all steps and connections for the flow.

        **Validation enforced by the server (returns 400 on failure):**
          - `step_type` must be one of: trigger, wait, send_notification,
            send_email, send_sms, send_whatsapp, condition, branch,
            wait_for_response, wait_until_date, end.
          - `edge_type` must be one of: default, condition_yes, condition_no,
            loan_type_purchase, loan_type_refinance, no_response, responded.
          - `trigger_event` (when step_type=trigger) must be one of the
            `ReminderTriggerEvent` enum values.
          - Every step must have a non-empty `label`.
          - `step_key` values must be unique within the payload.
          - `edge_key` values must be unique within the payload.
          - Every connection's `source_step_key` and `target_step_key` must
            reference a `step_key` present in the payload.
          - `position_x` / `position_y` are NaN-guarded (default 0).
          - `trigger_delay_days` is clamped to >= 0.

        Also persists `flow_category` (`loan` | `realtor_prospecting`),
        `loan_type_filter`, `realtor_role_filter`, and `is_active` when
        provided.
      security:
        - BrokerAuth: []
      parameters:
        - in: path
          name: flowId
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                description: { type: string, nullable: true }
                flow_category:
                  type: string
                  enum: [loan, realtor_prospecting]
                loan_type_filter:
                  type: string
                  nullable: true
                  enum: [purchase, refinance, null]
                realtor_role_filter:
                  type: string
                  nullable: true
                is_active: { type: boolean }
                nodes: { type: array, items: { type: object } }
                edges: { type: array, items: { type: object } }
      responses:
        "200":
          description: Saved
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessResponse" }
        "400":
          description: Validation failure (invalid enum, duplicate key, missing label, or unresolved connection reference)
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: false }
                  message: { type: string }
    delete:
      tags: [Reminder Flows]
      summary: Delete a reminder flow
      security:
        - BrokerAuth: []
      parameters:
        - in: path
          name: flowId
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessResponse" }

  /reminder-flows/{flowId}/toggle:
    patch:
      tags: [Reminder Flows]
      summary: Toggle a reminder flow active/inactive
      security:
        - BrokerAuth: []
      parameters:
        - in: path
          name: flowId
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Toggled
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      is_active: { type: boolean }

  /reminder-flow-executions:
    get:
      tags: [Reminder Flows]
      summary: List reminder flow execution history
      security:
        - BrokerAuth: []
      responses:
        "200":
          description: Executions
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      executions: { type: array, items: { type: object } }

  /reminder-flow-executions/{executionId}/respond:
    post:
      tags: [Reminder Flows]
      summary: Mark a flow execution as responded (stops further messages)
      security:
        - BrokerAuth: []
      parameters:
        - in: path
          name: executionId
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Marked responded
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessResponse" }

  # ── Scheduler (Public) ────────────────────────────────────────────────────────
  /public/scheduler:
    get:
      tags: [Scheduler (Public)]
      summary: Get default broker's scheduler info and available dates
      description: Used by the public booking page when no broker token is specified.
      responses:
        "200":
          description: Scheduler info and available dates
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      broker: { type: object }
                      available_dates:
                        type: array
                        items: { type: string, format: date }

  /public/scheduler/{token}:
    get:
      tags: [Scheduler (Public)]
      summary: Get specific broker's scheduler info and available dates by public token
      parameters:
        - in: path
          name: token
          required: true
          schema: { type: string }
          description: Broker's `public_token`
      responses:
        "200":
          description: Scheduler info and available dates
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      broker: { type: object }
                      available_dates:
                        type: array
                        items: { type: string, format: date }
        "404":
          description: Broker not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /public/scheduler/{token}/slots:
    get:
      tags: [Scheduler (Public)]
      summary: Get available time slots for a specific date
      parameters:
        - in: path
          name: token
          required: true
          schema: { type: string }
          description: Broker's `public_token` or `"default"`
        - in: query
          name: date
          required: true
          schema: { type: string, format: date }
          description: Date in YYYY-MM-DD format
      responses:
        "200":
          description: Available slots
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      slots:
                        type: array
                        items:
                          type: object
                          properties:
                            time: { type: string, example: "14:00" }
                            end_time: { type: string, example: "14:30" }
                            available: { type: boolean }

  /public/scheduler/book:
    post:
      tags: [Scheduler (Public)]
      summary: Book a meeting slot
      description: |
        Creates a confirmed meeting. Sends confirmation email to client and notification to broker.
        Creates a Zoom meeting automatically if `meeting_type: "video"` and Zoom credentials are configured.
        Creates a Teams meeting automatically if `meeting_type: "teams"` and Azure credentials are configured.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                [
                  broker_token,
                  client_name,
                  client_email,
                  meeting_date,
                  meeting_time,
                  meeting_type,
                ]
              properties:
                broker_token:
                  type: string
                  description: Broker's `public_token` or `"default"`
                client_name: { type: string }
                client_email: { type: string, format: email }
                client_phone: { type: string }
                meeting_date: { type: string, format: date }
                meeting_time:
                  type: string
                  example: "14:00"
                  description: HH:MM format
                meeting_type:
                  type: string
                  enum: [phone, video, teams]
                notes: { type: string }
      responses:
        "200":
          description: Meeting booked
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      meeting_id: { type: integer }
                      booking_token: { type: string }
                      zoom_join_url: { type: string, nullable: true }
                      zoom_start_url: { type: string, nullable: true }
                      teams_join_url: { type: string, nullable: true }
                      meeting_date: { type: string, format: date }
                      meeting_time: { type: string }
                      meeting_type: { type: string }
                      broker_name: { type: string }
        "400":
          description: Slot unavailable or validation error
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "409":
          description: Slot already taken
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "503":
          description: Video meeting requested but provider meeting could not be created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /public/scheduler/cancel/{bookingToken}:
    post:
      tags: [Scheduler (Public)]
      summary: Cancel a meeting by booking token
      description: Client-facing cancellation. Sends cancellation emails to both parties.
      parameters:
        - in: path
          name: bookingToken
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason: { type: string }
      responses:
        "200":
          description: Cancelled
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessResponse" }
        "404":
          description: Meeting not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /public/scheduler/reschedule/{bookingToken}:
    get:
      tags: [Scheduler (Public)]
      summary: Get current booking details for reschedule confirmation
      parameters:
        - in: path
          name: bookingToken
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Reschedule info loaded
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      broker_public_token: { type: string }
                      broker_name: { type: string, nullable: true }
                      broker_timezone: { type: string, nullable: true }
                      client_name: { type: string }
                      client_email: { type: string, format: email }
                      client_phone: { type: string, nullable: true }
                      meeting_type: { type: string, enum: [phone, video, teams] }
                      old_meeting_date: { type: string, format: date }
                      old_meeting_time: { type: string, example: "12:00:00" }
        "404":
          description: Booking not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "410":
          description: Booking already cancelled
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
    post:
      tags: [Scheduler (Public)]
      summary: Cancel current booking and atomically book a new slot
      parameters:
        - in: path
          name: bookingToken
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [new_date, new_time]
              properties:
                new_date:
                  {
                    type: string,
                    example: "2026-05-10",
                    description: "New meeting date (YYYY-MM-DD)",
                  }
                new_time:
                  {
                    type: string,
                    example: "14:00",
                    description: "New meeting time (HH:MM)",
                  }
      responses:
        "200":
          description: Old booking cancelled and new booking confirmed
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      booking_token: { type: string }
                      meeting_date: { type: string }
                      meeting_time: { type: string }
                      zoom_join_url: { type: string, nullable: true }
                      teams_join_url: { type: string, nullable: true }
                      broker_name: { type: string }
        "400":
          description: Missing or invalid new_date / new_time, or slot unavailable
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "404":
          description: Booking not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "409":
          description: Requested slot is already taken
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "410":
          description: Booking already cancelled
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "503":
          description: Video meeting requested but Zoom meeting could not be created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  # ── Scheduler (Admin) ─────────────────────────────────────────────────────────
  /scheduler/settings:
    get:
      tags: [Scheduler (Admin)]
      summary: Get broker's scheduler settings and availability
      security:
        - BrokerAuth: []
      responses:
        "200":
          description: Settings and availability
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      settings: { type: object }
                      availability: { type: array, items: { type: object } }
    put:
      tags: [Scheduler (Admin)]
      summary: Update scheduler settings and availability windows
      security:
        - BrokerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                is_enabled: { type: boolean }
                meeting_title: { type: string }
                meeting_description: { type: string }
                slot_duration_minutes: { type: integer, example: 30 }
                buffer_time_minutes: { type: integer, example: 15 }
                advance_booking_days: { type: integer, example: 30 }
                min_booking_hours: { type: integer, example: 2 }
                timezone: { type: string, example: "America/Chicago" }
                allow_phone: { type: boolean }
                allow_video: { type: boolean }
                allow_teams: { type: boolean }
                availability:
                  type: array
                  items:
                    type: object
                    properties:
                      day_of_week: { type: integer, minimum: 0, maximum: 6 }
                      start_time: { type: string, example: "09:00" }
                      end_time: { type: string, example: "17:00" }
                      is_active: { type: boolean }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessResponse" }

  /scheduler/teams-eligibility:
    get:
      tags: [Scheduler (Admin)]
      summary: Check if current broker can enable Teams meetings
      security:
        - BrokerAuth: []
      responses:
        "200":
          description: Eligibility result
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      eligible: { type: boolean }
                      error: { type: string, nullable: true }

  /scheduler/meetings:
    get:
      tags: [Scheduler (Admin)]
      summary: List scheduled meetings
      description: Admins see all meetings; Partners only see their own.
      security:
        - BrokerAuth: []
      parameters:
        - in: query
          name: status
          schema:
            { type: string, enum: [confirmed, completed, cancelled, no_show] }
        - in: query
          name: from
          schema: { type: string, format: date }
        - in: query
          name: to
          schema: { type: string, format: date }
        - in: query
          name: broker_id
          schema: { type: integer }
          description: Filter by broker (admin only)
      responses:
        "200":
          description: Meetings list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      meetings:
                        type: array
                        items: { $ref: "#/components/schemas/ScheduledMeeting" }
                      total: { type: integer }
    post:
      tags: [Scheduler (Admin)]
      summary: Create a meeting manually (admin)
      security:
        - BrokerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                [
                  client_name,
                  client_email,
                  meeting_date,
                  meeting_time,
                  meeting_type,
                ]
              properties:
                client_name: { type: string }
                client_email: { type: string, format: email }
                client_phone: { type: string }
                meeting_date: { type: string, format: date }
                meeting_time: { type: string, example: "10:00" }
                meeting_type: { type: string, enum: [phone, video, teams] }
                notes: { type: string }
                target_broker_id:
                  type: integer
                  description: Assign to a specific broker (admin only)
      responses:
        "200":
          description: Created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      meeting_id: { type: integer }
                      booking_token: { type: string }
        "503":
          description: Video meeting requested but provider meeting could not be created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /scheduler/meetings/{meetingId}:
    put:
      tags: [Scheduler (Admin)]
      summary: Update a scheduled meeting (reschedule, cancel, add notes)
      security:
        - BrokerAuth: []
      parameters:
        - in: path
          name: meetingId
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  {
                    type: string,
                    enum: [confirmed, completed, cancelled, no_show],
                  }
                broker_notes: { type: string }
                meeting_date: { type: string, format: date }
                meeting_time: { type: string, example: "15:00" }
                meeting_type: { type: string, enum: [phone, video, teams] }
                cancelled_reason: { type: string }
                cancelled_by: { type: string, enum: [client, broker] }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessResponse" }

  # ── Calendar Events ──────────────────────────────────────────────────────────

  /scheduler/blocked-ranges:
    get:
      tags: [Scheduler (Admin)]
      summary: List blocked date/time ranges
      security:
        - BrokerAuth: []
      responses:
        "200":
          description: List of blocked ranges for the authenticated broker
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  blocked_ranges:
                    type: array
                    items:
                      $ref: "#/components/schemas/SchedulerBlockedRange"
    post:
      tags: [Scheduler (Admin)]
      summary: Add a blocked date/time range
      security:
        - BrokerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [start_datetime, end_datetime]
              properties:
                start_datetime:
                  {
                    type: string,
                    format: date-time,
                    example: "2026-04-20T09:00",
                  }
                end_datetime:
                  {
                    type: string,
                    format: date-time,
                    example: "2026-04-20T17:00",
                  }
                label: { type: string, example: "Vacation" }
      responses:
        "200":
          description: Blocked range created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  blocked_range:
                    { $ref: "#/components/schemas/SchedulerBlockedRange" }
        "400":
          description: Validation error

  /scheduler/blocked-ranges/{id}:
    delete:
      tags: [Scheduler (Admin)]
      summary: Delete a blocked date/time range
      security:
        - BrokerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessResponse" }
        "404":
          description: Not found

  /calendar/events:
    get:
      tags: [Calendar]
      summary: List calendar events (birthdays, anniversaries, reminders, etc.)
      security:
        - BrokerAuth: []
      parameters:
        - in: query
          name: from
          schema: { type: string, format: date }
          description: Filter events on or after this date (YYYY-MM-DD)
        - in: query
          name: to
          schema: { type: string, format: date }
          description: Filter events on or before this date (YYYY-MM-DD)
        - in: query
          name: event_type
          schema:
            type: string
            enum:
              [
                birthday,
                home_anniversary,
                realtor_anniversary,
                important_date,
                reminder,
                other,
                all,
              ]
          description: Filter by event type (omit or "all" for all types)
        - in: query
          name: search
          schema: { type: string }
          description: Full-text search against title, linked client name, and linked person name
        - in: query
          name: sort_by
          schema:
            type: string
            enum:
              [event_date, title, event_type, linked_client_name, recurrence]
            default: event_date
          description: Column to sort by
        - in: query
          name: sort_order
          schema:
            type: string
            enum: [ASC, DESC]
            default: ASC
          description: Sort direction
      responses:
        "200":
          description: List of calendar events
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  events:
                    type: array
                    items: { $ref: "#/components/schemas/CalendarEvent" }
                  total: { type: integer }
    post:
      tags: [Calendar]
      summary: Create a new calendar event
      security:
        - BrokerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [event_type, title, event_date]
              properties:
                event_type:
                  type: string
                  enum:
                    [
                      birthday,
                      home_anniversary,
                      realtor_anniversary,
                      important_date,
                      reminder,
                      other,
                    ]
                title: { type: string }
                description: { type: string }
                event_date: { type: string, format: date }
                event_time: { type: string, example: "10:00" }
                all_day: { type: boolean, default: true }
                recurrence:
                  { type: string, enum: [none, yearly], default: none }
                color: { type: string, example: "#e81932" }
                linked_client_id: { type: integer, nullable: true }
                linked_person_name: { type: string }
      responses:
        "201":
          description: Event created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  event: { $ref: "#/components/schemas/CalendarEvent" }

  /calendar/events/{eventId}:
    put:
      tags: [Calendar]
      summary: Update a calendar event
      security:
        - BrokerAuth: []
      parameters:
        - in: path
          name: eventId
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                event_type:
                  type: string
                  enum:
                    [
                      birthday,
                      home_anniversary,
                      realtor_anniversary,
                      important_date,
                      reminder,
                      other,
                    ]
                title: { type: string }
                description: { type: string, nullable: true }
                event_date: { type: string, format: date }
                event_time: { type: string, nullable: true }
                all_day: { type: boolean }
                recurrence: { type: string, enum: [none, yearly] }
                color: { type: string, nullable: true }
                linked_client_id: { type: integer, nullable: true }
                linked_person_name: { type: string, nullable: true }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessResponse" }
    delete:
      tags: [Calendar]
      summary: Delete a calendar event
      security:
        - BrokerAuth: []
      parameters:
        - in: path
          name: eventId
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessResponse" }

  /calendar/sync-birthdays:
    post:
      tags: [Calendar]
      summary: Sync birthday events from clients and broker profiles
      description: >
        Upserts yearly birthday calendar events for all clients with a date_of_birth,
        and all broker_profiles (partners + mortgage bankers) with a date_of_birth.
        Admin only. Idempotent — safe to run multiple times.
      security:
        - BrokerAuth: []
      responses:
        "200":
          description: Sync result
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  created:
                    {
                      type: integer,
                      description: "Number of new birthday events created",
                    }
                  updated:
                    {
                      type: integer,
                      description: "Number of existing birthday events updated",
                    }
        "403":
          description: Admin only

  # ── Contact ───────────────────────────────────────────────────────────────────
  /contact:
    post:
      tags: [Contact]
      summary: Submit the public contact form
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, subject, message]
              properties:
                name: { type: string }
                email: { type: string, format: email }
                phone: { type: string }
                subject: { type: string }
                message: { type: string }
      responses:
        "201":
          description: Message received
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessResponse" }
        "400":
          description: Missing required fields or invalid email
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
    get:
      tags: [Contact]
      summary: Get all contact form submissions (admin)
      security:
        - BrokerAuth: []
      responses:
        "200":
          description: Submissions
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      submissions: { type: array, items: { type: object } }

  # ── Proxy Utilities ───────────────────────────────────────────────────────────
  /proxy/pdf:
    get:
      tags: [Public]
      summary: Server-side PDF proxy (avoids CORS)
      description: Fetches a PDF from an external URL server-side and streams it to the browser. Used for PDF rendering in the client.
      parameters:
        - in: query
          name: url
          required: true
          schema: { type: string, format: uri }
      responses:
        "200":
          description: PDF stream
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        "400":
          description: Invalid URL
        "502":
          description: Upstream error

  /image-proxy:
    get:
      tags: [Public]
      summary: Server-side image proxy (avoids CORS for PDF generation)
      description: Fetches an image from an external URL and forwards it. Cached for 24 hours. Used by jsPDF for embedding external images.
      parameters:
        - in: query
          name: url
          required: true
          schema: { type: string, format: uri }
      responses:
        "200":
          description: Image bytes
          content:
            image/*:
              schema:
                type: string
                format: binary
        "400":
          description: Invalid URL

  # ── Webhooks & Cron ───────────────────────────────────────────────────────────
  /webhooks/inbound-email:
    post:
      tags: [Webhooks & Cron]
      summary: Inbound email webhook (Postmark / Mailgun / SendGrid)
      description: |
        Receives inbound parsed emails from an email service provider and:
        1. Creates an inbound `communications` record.
        2. Upserts the `conversation_thread` via DB trigger.
        3. Marks any active `reminder_flow_executions` waiting on this
           conversation as responded so the cron can advance the flow.

        Protected by `INBOUND_WEBHOOK_SECRET` header — do NOT expose to public callers.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Webhook payload (format varies by provider — Postmark, Mailgun, or SendGrid)
      responses:
        "200":
          description: Processed
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessResponse" }

  /webhooks/inbound-sms:
    post:
      tags: [Webhooks & Cron]
      summary: Inbound SMS webhook (Twilio)
      description: |
        Receives inbound SMS messages from Twilio and:
        1. Looks up the client by sender phone number.
        2. Finds the most recent active flow execution for that client
           to determine the correct conversation_id.
        3. Creates an inbound `communications` record.
        4. Upserts the `conversation_thread` via DB trigger.
        5. Marks any active `reminder_flow_executions` waiting on this
           conversation as responded so the cron can advance the flow.

        Configure in Twilio Console → Phone Numbers → Active Numbers → Messaging:
          Webhook URL: `https://yourdomain.com/api/webhooks/inbound-sms`
          HTTP Method: `POST`

        Protected by optional `INBOUND_WEBHOOK_SECRET` header.
        Returns an empty TwiML `<Response>` so Twilio does not auto-reply.
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [Body, From, To, MessageSid]
              properties:
                Body:
                  type: string
                  description: SMS message text
                From:
                  type: string
                  description: Sender E.164 phone number (e.g. +15550001111)
                To:
                  type: string
                  description: Your Twilio number (e.g. +15559990000)
                MessageSid:
                  type: string
                  description: Twilio message SID
                AccountSid:
                  type: string
                  description: Twilio account SID
      responses:
        "200":
          description: Empty TwiML response
          content:
            text/xml:
              schema:
                type: string
                example: "<Response></Response>"

  /cron/poll-inbound-email:
    get:
      tags: [Webhooks & Cron]
      summary: Poll IMAP inbox for inbound emails (cron trigger)
      description: |
        Called by Vercel Cron or cPanel cron via curl.
        Polls the configured IMAP inbox, ingests new emails as conversation messages,
        and marks matching active reminder flow executions as responded.
      responses:
        "200":
          description: Poll complete
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessResponse" }

  /cron/process-reminder-flows:
    get:
      tags: [Webhooks & Cron]
      summary: Process pending reminder flow executions (cron trigger)
      description: |
        Run every 5–15 minutes via cPanel cron:
        `curl -s "https://yourdomain.com/api/cron/process-reminder-flows?secret=CRON_SECRET"`

        Processes all pending flow execution steps and sends due messages.
      parameters:
        - in: query
          name: secret
          required: false
          schema: { type: string }
          description: Shared secret matching `CRON_SECRET` env var
      responses:
        "200":
          description: Processing complete
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessResponse" }

  /cron/backfill-message-status:
    get:
      tags: [Webhooks & Cron]
      summary: Backfill stale Twilio delivery_status (cron trigger)
      description: |
        Run every ~10 minutes via cPanel cron:
        `curl -s "https://yourdomain.com/api/cron/backfill-message-status?secret=CRON_SECRET"`

        Picks up to 50 outbound SMS/MMS/WhatsApp rows whose `delivery_status`
        is still `sent`/`pending` more than 2 minutes after `sent_at`,
        queries Twilio for the authoritative status, and updates the row.
        Catches messages whose `statusCallback` webhook never arrived.
      parameters:
        - in: query
          name: secret
          required: false
          schema: { type: string }
          description: Shared secret matching `CRON_SECRET` env var
      responses:
        "200":
          description: Backfill complete
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  checked: { type: integer }
                  updated: { type: integer }
                  unchanged: { type: integer }
                  errors: { type: integer }

  /cron/sync-teams-policy:
    get:
      tags: [Webhooks & Cron]
      summary: Sync Teams application-access policy for teams-enabled users (cron trigger)
      description: |
        Runs the server script that grants Teams app-access policy for active users
        with `allow_teams = 1`.

        Run daily via cPanel cron:
        `curl -s "https://yourdomain.com/api/cron/sync-teams-policy?secret=CRON_SECRET"`
      parameters:
        - in: query
          name: secret
          required: false
          schema: { type: string }
          description: Shared secret matching `CRON_SECRET` env var
      responses:
        "200":
          description: Teams policy sync complete
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  message: { type: string }
                  output: { type: string, nullable: true }
                  warnings: { type: string, nullable: true }

  # ─── Realtor Prospecting Pipeline ─────────────────────────────────────────
  /realtor-prospects:
    get:
      tags: [Realtor Prospecting]
      summary: List realtor prospects
      description: >
        Returns all realtor prospect opportunities for the logged-in broker.
        Superadmins see all; others see only their own (created or owned).
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: stage
          schema:
            type: string
            enum:
              [
                contact_attempted,
                contacted,
                appt_set,
                waiting_for_1st_deal,
                first_deal_funded,
                second_deal_funded,
                top_agent_whale,
              ]
        - in: query
          name: status
          schema: { type: string, enum: [open, won, lost] }
        - in: query
          name: search
          schema: { type: string }
        - in: query
          name: owner_broker_id
          schema: { type: integer }
      responses:
        "200":
          description: List of realtor prospects
    post:
      tags: [Realtor Prospecting]
      summary: Create a realtor prospect opportunity
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [opportunity_name]
              properties:
                opportunity_name: { type: string }
                stage:
                  {
                    type: string,
                    enum:
                      [
                        contact_attempted,
                        contacted,
                        appt_set,
                        waiting_for_1st_deal,
                        first_deal_funded,
                        second_deal_funded,
                        top_agent_whale,
                      ],
                  }
                status: { type: string, enum: [open, won, lost] }
                opportunity_value: { type: number }
                contact_name: { type: string }
                contact_email: { type: string }
                contact_phone: { type: string }
                business_name: { type: string }
                opportunity_source: { type: string }
                tags: { type: array, items: { type: string } }
                notes: { type: string }
                owner_broker_id: { type: integer, nullable: true }
                followers: { type: array, items: { type: integer } }
                progress_report:
                  { type: string, enum: [ready_to_send, sent], nullable: true }
                add_to_refi_rates_dropped: { type: boolean }
      responses:
        "201":
          description: Realtor prospect created
  /realtor-prospects/{id}:
    get:
      tags: [Realtor Prospecting]
      summary: Get a single realtor prospect
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Realtor prospect details
    patch:
      tags: [Realtor Prospecting]
      summary: Update a realtor prospect
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Updated prospect
    delete:
      tags: [Realtor Prospecting]
      summary: Delete a realtor prospect
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Deleted
  /realtor-prospects/{id}/stage:
    patch:
      tags: [Realtor Prospecting]
      summary: Update the stage of a realtor prospect (drag & drop)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [stage]
              properties:
                stage:
                  {
                    type: string,
                    enum:
                      [
                        contact_attempted,
                        contacted,
                        appt_set,
                        waiting_for_1st_deal,
                        first_deal_funded,
                        second_deal_funded,
                        top_agent_whale,
                      ],
                  }
      responses:
        "200":
          description: Stage updated

  /notifications:
    get:
      tags: [Notifications]
      summary: List notifications for the authenticated broker
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: unread_only
          schema: { type: string, enum: ["1"] }
          description: When "1", returns only unread notifications.
        - in: query
          name: limit
          schema: { type: integer, default: 50, maximum: 200 }
      responses:
        "200":
          description: List of broker notifications
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  unread_count: { type: integer }
                  notifications:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: integer }
                        title: { type: string }
                        message: { type: string }
                        notification_type:
                          { type: string, enum: [info, success, warning, error] }
                        category:
                          {
                            type: string,
                            enum: [message, call, loan, client, task, flow, lead, system],
                          }
                        is_read: { type: boolean }
                        action_url: { type: string, nullable: true }
                        created_at: { type: string, format: date-time }
                        read_at: { type: string, format: date-time, nullable: true }

  /notifications/{id}/read:
    put:
      tags: [Notifications]
      summary: Mark a single notification as read
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Notification marked as read

  /notifications/read-all:
    put:
      tags: [Notifications]
      summary: Mark all notifications as read for the authenticated broker
      security:
        - bearerAuth: []
      responses:
        "200":
          description: All notifications marked as read

  /notifications/{id}:
    delete:
      tags: [Notifications]
      summary: Dismiss (delete) a notification
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Notification deleted
