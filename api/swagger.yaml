    get:
      tags: [Voice]
      summary: Get paginated call history for the authenticated broker
      security:
        - BrokerAuth: []
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 50, maximum: 100 }
      responses:
        "200":
          description: Call history list
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  calls:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: integer }
                        direction: { type: string, enum: [inbound, outbound] }
                        body: { type: string }
                        status: { type: string }
                        external_id: { type: string, nullable: true }
                        conversation_id: { type: string, nullable: true }
                        client_name: { type: string, nullable: true }
                        client_phone: { type: string, nullable: true }
                        client_id: { type: integer, nullable: true }
                        created_at: { type: string, format: date-time }
                        sent_at:
                          { type: string, format: date-time, nullable: true }
                  pagination:
                    type: object
                    properties:
                      page: { type: integer }
                      limit: { type: integer }
                      total: { type: integer }
                      totalPages: { type: integer }

