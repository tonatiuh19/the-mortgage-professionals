openapi: 3.0.3
info:
  title: The Mortgage Professionals API
  description: |
    Full REST API for the The Mortgage Professionals platform.

    ## Authentication
    - **Broker/Admin routes** require `Authorization: Bearer <broker_session_token>`
    - **Client portal routes** require `Authorization: Bearer <client_session_token>`
    - **Public routes** require no authentication
    - **Webhook/Cron routes** are protected by shared secrets in query params or headers

    ## Base URL
    All endpoints are prefixed with `/api`.

    ## Email Delivery Notes
    - General outbound email uses `SMTP_*` environment variables.
    - Reminder flow email steps can use `REMINDER_SMTP_*` overrides when configured.
  version: "1.0.0"
  contact:
    name: The Mortgage Professionals Dev

servers:
  - url: /api
    description: Same-origin (development & production on port 8080)

tags:
  - name: Health
    description: System health checks
  - name: Admin Auth
    description: Broker / admin authentication (passwordless OTP)
  - name: Client Auth
    description: Client portal authentication (passwordless OTP)
  - name: Admin Bootstrap
    description: Session init and section controls
  - name: Admin Profile
    description: Authenticated broker's own profile management
  - name: Dashboard
    description: Overview stats and broker performance metrics
  - name: Loans
    description: Loan application management
  - name: Pre-Approval
    description: Pre-approval letter generation and delivery
  - name: Clients
    description: Client directory (admin view)
  - name: Voice
    description: Browser-based calling via Twilio Voice SDK
  - name: Brokers
    description: Broker / team member management
  - name: Tasks
    description: Task templates and loan-linked task instances
  - name: Documents
    description: Document uploads and management
  - name: Email Templates
    description: Email communication templates
  - name: SMS Templates
    description: SMS communication templates
  - name: WhatsApp Templates
    description: WhatsApp communication templates
  - name: Pipeline Step Templates
    description: Per-step communication templates for the pipeline
  - name: Conversations
    description: Inbound/outbound message threads
  - name: Audit Logs
    description: Activity history
  - name: Reports
    description: Analytics and reporting
  - name: Settings
    description: Tenant-level system settings
  - name: Reminder Flows
    description: Automated reminder sequences
  - name: Scheduler (Public)
    description: Public-facing booking endpoints
  - name: Scheduler (Admin)
    description: Admin scheduler settings and meeting management
  - name: Calendar
    description: Calendar events — birthdays, home/realtor anniversaries, important dates and reminders
  - name: Contact
    description: Public contact form submissions
  - name: Public
    description: Unauthenticated public endpoints
  - name: Webhooks & Cron
    description: Inbound webhooks and scheduled cron triggers

# ─── Security Schemes ─────────────────────────────────────────────────────────
components:
  securitySchemes:
    BrokerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Broker session token stored in `localStorage["broker_session"]`
    ClientAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Client session token stored in `localStorage["client_session_token"]`

  # ─── Reusable Schemas ───────────────────────────────────────────────────────
  schemas:
    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true

    SchedulerBlockedRange:
      type: object
      properties:
        id: { type: integer }
        broker_id: { type: integer }
        start_datetime: { type: string, format: date-time }
        end_datetime: { type: string, format: date-time }
        label: { type: string, nullable: true }
        created_at: { type: string, format: date-time }

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          type: string
          example: "Something went wrong"
        message:
          type: string

    BrokerUser:
      type: object
      properties:
        id: { type: integer }
        email: { type: string, format: email }
        first_name: { type: string }
        last_name: { type: string }
        phone: { type: string, nullable: true }
        role:
          type: string
          enum: [admin, broker]
          description: "admin = Mortgage Banker, broker = Partner (Realtor)"
        tenant_id: { type: integer }
        status:
          type: string
          enum: [active, inactive, suspended]
        license_number: { type: string, nullable: true }
        specializations:
          type: array
          items: { type: string }
          nullable: true
        email_verified: { type: boolean }
        last_login: { type: string, format: date-time, nullable: true }
        public_token: { type: string, nullable: true }
        avatar_url: { type: string, nullable: true }
        bio: { type: string, nullable: true }
        office_address: { type: string, nullable: true }
        office_city: { type: string, nullable: true }
        office_state: { type: string, nullable: true }
        office_zip: { type: string, nullable: true }
        years_experience: { type: integer, nullable: true }
        total_loans_closed: { type: integer, nullable: true }

    ClientInfo:
      type: object
      properties:
        id: { type: integer }
        email: { type: string, format: email }
        first_name: { type: string }
        middle_name: { type: string, nullable: true }
        last_name: { type: string }
        phone: { type: string, nullable: true }
        date_of_birth: { type: string, format: date, nullable: true }
        address_street: { type: string, nullable: true }
        address_unit: { type: string, nullable: true }
        address_city: { type: string, nullable: true }
        address_state: { type: string, nullable: true }
        address_zip: { type: string, nullable: true }
        status: { type: string }
        created_at: { type: string, format: date-time }
        total_applications: { type: integer }
        active_applications: { type: integer }
        total_conversations: { type: integer }

    LoanApplication:
      type: object
      properties:
        id: { type: integer }
        application_number: { type: string }
        client_user_id: { type: integer }
        broker_user_id: { type: integer, nullable: true }
        partner_broker_id: { type: integer, nullable: true }
        loan_type: { type: string }
        loan_amount: { type: number }
        property_value: { type: number }
        property_address: { type: string, nullable: true }
        property_city: { type: string, nullable: true }
        property_state: { type: string, nullable: true }
        property_zip: { type: string, nullable: true }
        property_type: { type: string, nullable: true }
        down_payment: { type: number, nullable: true }
        loan_purpose: { type: string, nullable: true }
        status: { type: string }
        current_step: { type: integer }
        total_steps: { type: integer }
        priority: { type: string, nullable: true }
        estimated_close_date: { type: string, format: date, nullable: true }
        actual_close_date: { type: string, format: date, nullable: true }
        interest_rate: { type: number, nullable: true }
        loan_term_months: { type: integer, nullable: true }
        notes: { type: string, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    Task:
      type: object
      properties:
        id: { type: integer }
        title: { type: string }
        description: { type: string, nullable: true }
        status: { type: string }
        due_date: { type: string, format: date, nullable: true }
        loan_application_id: { type: integer, nullable: true }
        assigned_to: { type: integer, nullable: true }
        created_at: { type: string, format: date-time }

    AdminSectionControl:
      type: object
      properties:
        id: { type: integer }
        tenant_id: { type: integer }
        section_id:
          type: string
          description: Matches the sidebar menu item id
          example: "pipeline"
        is_disabled: { type: boolean }
        tooltip_message: { type: string, example: "Coming Soon" }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    ScheduledMeeting:
      type: object
      properties:
        id: { type: integer }
        broker_id: { type: integer }
        client_name: { type: string }
        client_email: { type: string, format: email }
        client_phone: { type: string, nullable: true }
        meeting_date: { type: string, format: date }
        meeting_time: { type: string, example: "14:00" }
        meeting_end_time: { type: string, example: "14:30" }
        meeting_type:
          type: string
          enum: [phone, video, teams]
        status:
          type: string
          enum: [confirmed, completed, cancelled, no_show]
        zoom_join_url: { type: string, nullable: true }
        zoom_start_url: { type: string, nullable: true }
        teams_meeting_id: { type: string, nullable: true }
        teams_join_url: { type: string, nullable: true }
        booking_token: { type: string }
        notes: { type: string, nullable: true }
        broker_notes: { type: string, nullable: true }
        created_at: { type: string, format: date-time }

    CalendarEvent:
      type: object
      properties:
        id: { type: integer }
        tenant_id: { type: integer }
        broker_id: { type: integer, nullable: true }
        event_type:
          type: string
          enum:
            [
              birthday,
              home_anniversary,
              realtor_anniversary,
              important_date,
              reminder,
              other,
            ]
        title: { type: string }
        description: { type: string, nullable: true }
        event_date: { type: string, format: date }
        event_time: { type: string, nullable: true, example: "10:00" }
        all_day: { type: boolean }
        recurrence:
          type: string
          enum: [none, yearly]
        color: { type: string, nullable: true }
        linked_client_id: { type: integer, nullable: true }
        linked_client_name: { type: string, nullable: true }
        linked_person_name: { type: string, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

# ─── Paths ────────────────────────────────────────────────────────────────────
paths:
  # ── Health ──────────────────────────────────────────────────────────────────
  /health:
    get:
      tags: [Health]
      summary: Health check
      description: Returns 200 with server status. Used by load balancers and uptime monitors.
      responses:
        "200":
          description: Server is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: ok }

  /ping:
    get:
      tags: [Health]
      summary: Ping
      description: Simple liveness ping.
      responses:
        "200":
          description: Pong
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string, example: pong }

  # ── Admin Auth ───────────────────────────────────────────────────────────────
  /admin/auth/send-code:
    post:
      tags: [Admin Auth]
      summary: Send OTP to broker email or phone
      description: Sends a one-time 6-digit code via email or SMS. The broker must already exist in the `brokers` table.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
                delivery_method:
                  type: string
                  enum: [email, sms]
                  default: email
      responses:
        "200":
          description: Code sent successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      message: { type: string }
        "400":
          description: Invalid email or broker not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /admin/auth/verify-code:
    post:
      tags: [Admin Auth]
      summary: Verify OTP and create broker session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, code]
              properties:
                email: { type: string, format: email }
                code:
                  type: string
                  description: 6-digit numeric code
                  example: "123456"
      responses:
        "200":
          description: Authenticated — returns session token and user
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      sessionToken: { type: string }
                      user: { $ref: "#/components/schemas/BrokerUser" }
        "401":
          description: Invalid or expired code
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /admin/auth/validate:
    get:
      tags: [Admin Auth]
      summary: Validate existing broker session
      description: Called on app boot to verify a stored token is still valid.
      security:
        - BrokerAuth: []
      responses:
        "200":
          description: Session valid
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      user: { $ref: "#/components/schemas/BrokerUser" }
        "401":
          description: Session invalid or expired
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /admin/auth/logout:
    post:
      tags: [Admin Auth]
      summary: Logout broker session
      security:
        - BrokerAuth: []
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessResponse" }

  # ── Client Auth ──────────────────────────────────────────────────────────────
  /client/auth/send-code:
    post:
      tags: [Client Auth]
      summary: Send OTP to client email or phone
      description: |
        Sends a 6-digit OTP. If the email is not found in the `client_users` table,
        the response sets `shouldRedirectToWizard: true` and the UI redirects to `/wizard`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email: { type: string, format: email }
                delivery_method:
                  type: string
                  enum: [email, sms]
                  default: email
      responses:
        "200":
          description: Code sent or redirect flag set
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      shouldRedirectToWizard:
                        type: boolean
                        description: True when the email is not registered — redirect to onboarding wizard
        "400":
          description: Invalid request
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /client/auth/verify-code:
    post:
      tags: [Client Auth]
      summary: Verify OTP and create client session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, code]
              properties:
                email: { type: string, format: email }
                code:
                  type: string
                  pattern: '^\d{6}$'
                  example: "489201"
      responses:
        "200":
          description: Authenticated — returns session token
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      sessionToken: { type: string }
                      client: { $ref: "#/components/schemas/ClientInfo" }
        "401":
          description: Invalid code
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /client/auth/validate:
    get:
      tags: [Client Auth]
      summary: Validate existing client session
      security:
        - ClientAuth: []
      responses:
        "200":
          description: Session valid
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      client: { $ref: "#/components/schemas/ClientInfo" }
        "401":
          description: Invalid or expired session
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /client/auth/logout:
    post:
      tags: [Client Auth]
      summary: Logout client session
      security:
        - ClientAuth: []
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessResponse" }

  # ── Admin Bootstrap ──────────────────────────────────────────────────────────
  /admin/init:
    get:
      tags: [Admin Bootstrap]
      summary: Single bootstrap call on admin load
      description: |
        Validates session, returns broker profile + all section controls in a single request.
        Called by `initAdminSession()` thunk on every admin page mount.
      security:
        - BrokerAuth: []
      responses:
        "200":
          description: Bootstrap data
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      profile:
                        type: object
                        description: Broker profile details
                      controls:
                        type: array
                        items:
                          { $ref: "#/components/schemas/AdminSectionControl" }
        "401":
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /admin/section-controls:
    get:
      tags: [Admin Bootstrap]
      summary: Get all section controls for the tenant
      security:
        - BrokerAuth: []
      responses:
        "200":
          description: Section controls list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      controls:
                        type: array
                        items:
                          { $ref: "#/components/schemas/AdminSectionControl" }
    put:
      tags: [Admin Bootstrap]
      summary: Bulk update section controls
      description: Enable or disable sidebar sections and set tooltip messages.
      security:
        - BrokerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [controls]
              properties:
                controls:
                  type: array
                  items:
                    type: object
                    required: [section_id, is_disabled]
                    properties:
                      section_id: { type: string, example: "pipeline" }
                      is_disabled: { type: boolean }
                      tooltip_message: { type: string, example: "Coming Soon" }
      responses:
        "200":
          description: Updated successfully
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessResponse" }

  # ── Admin Profile ─────────────────────────────────────────────────────────────
  /admin/profile:
    get:
      tags: [Admin Profile]
      summary: Get authenticated broker's own profile
      security:
        - BrokerAuth: []
      responses:
        "200":
          description: Broker profile
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      profile: { $ref: "#/components/schemas/BrokerUser" }
    put:
      tags: [Admin Profile]
      summary: Update authenticated broker's profile
      security:
        - BrokerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                first_name: { type: string }
                last_name: { type: string }
                phone: { type: string }
                license_number: { type: string }
                bio: { type: string }
                office_address: { type: string }
                office_city: { type: string }
                office_state: { type: string }
                office_zip: { type: string }
                years_experience: { type: integer }
                specializations:
                  type: array
                  items: { type: string }
      responses:
        "200":
          description: Profile updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessResponse" }

  /admin/profile/avatar:
    put:
      tags: [Admin Profile]
      summary: Update broker avatar URL
      security:
        - BrokerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [avatar_url]
              properties:
                avatar_url: { type: string, format: uri }
      responses:
        "200":
          description: Avatar updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessResponse" }

  # ── Broker Share Link ─────────────────────────────────────────────────────────
  /brokers/my-share-link:
    get:
      tags: [Brokers]
      summary: Get authenticated broker's share link
      security:
        - BrokerAuth: []
      responses:
        "200":
          description: Share link info
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      share_url: { type: string }
                      public_token: { type: string }

  /brokers/my-share-link/regenerate:
    post:
      tags: [Brokers]
      summary: Regenerate broker's public token (new share link)
      security:
        - BrokerAuth: []
      responses:
        "200":
          description: New share link
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      share_url: { type: string }
                      public_token: { type: string }

  /brokers/my-share-link/email:
    post:
      tags: [Brokers]
      summary: Email the share link to a recipient
      security:
        - BrokerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [recipient_email]
              properties:
                recipient_email: { type: string, format: email }
                recipient_name: { type: string }
      responses:
        "200":
          description: Email sent
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessResponse" }

  # ── Dashboard ────────────────────────────────────────────────────────────────
  /dashboard/stats:
    get:
      tags: [Dashboard]
      summary: Overview dashboard stats
      security:
        - BrokerAuth: []
      responses:
        "200":
          description: Aggregate statistics
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      stats: { type: object }

  /dashboard/broker-metrics:
    get:
      tags: [Dashboard]
      summary: Current period broker metrics
      security:
        - BrokerAuth: []
      responses:
        "200":
          description: Broker metrics
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      metrics: { type: object }
    put:
      tags: [Dashboard]
      summary: Update broker metrics goals/actuals
      security:
        - BrokerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Metrics fields to update
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessResponse" }

  /dashboard/broker-metrics/annual:
    get:
      tags: [Dashboard]
      summary: Annual broker performance metrics
      security:
        - BrokerAuth: []
      responses:
        "200":
          description: Annual metrics by month
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      annual: { type: array, items: { type: object } }

  # ── Loans ────────────────────────────────────────────────────────────────────
  /loans:
    get:
      tags: [Loans]
      summary: List all loan applications
      security:
        - BrokerAuth: []
      parameters:
        - in: query
          name: status
          schema: { type: string }
          description: Filter by loan status
        - in: query
          name: broker_id
          schema: { type: integer }
          description: Filter by assigned broker (admin only)
      responses:
        "200":
          description: Loan list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      loans:
                        type: array
                        items: { $ref: "#/components/schemas/LoanApplication" }
                      total: { type: integer }

  /loans/create:
    post:
      tags: [Loans]
      summary: Create a new loan application (admin)
      security:
        - BrokerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [client_user_id, loan_type, loan_amount]
              properties:
                client_user_id: { type: integer }
                loan_type: { type: string }
                loan_amount: { type: number }
                property_value: { type: number }
                property_address: { type: string }
                property_city: { type: string }
                property_state: { type: string }
                property_zip: { type: string }
                notes: { type: string }
      responses:
        "201":
          description: Loan created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      loan: { $ref: "#/components/schemas/LoanApplication" }

  /loans/{loanId}:
    get:
      tags: [Loans]
      summary: Get loan details
      security:
        - BrokerAuth: []
      parameters:
        - in: path
          name: loanId
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Loan detail
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      loan: { $ref: "#/components/schemas/LoanApplication" }
        "404":
          description: Loan not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /loans/{loanId}/assign-broker:
    patch:
      tags: [Loans]
      summary: Assign primary broker to a loan
      security:
        - BrokerAuth: []
      parameters:
        - in: path
          name: loanId
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [broker_id]
              properties:
                broker_id: { type: integer }
      responses:
        "200":
          description: Broker assigned
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessResponse" }

  /loans/{loanId}/assign-partner:
    patch:
      tags: [Loans]
      summary: Assign partner (Realtor) broker to a loan
      security:
        - BrokerAuth: []
      parameters:
        - in: path
          name: loanId
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [partner_broker_id]
              properties:
                partner_broker_id: { type: integer, nullable: true }
      responses:
        "200":
          description: Partner assigned
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessResponse" }

  /loans/{loanId}/status:
    patch:
      tags: [Loans]
      summary: Update loan status
      security:
        - BrokerAuth: []
      parameters:
        - in: path
          name: loanId
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status: { type: string }
                notes: { type: string }
      responses:
        "200":
          description: Status updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessResponse" }

  /loans/{loanId}/source:
    patch:
      tags: [Loans]
      summary: Update loan lead source category
      security:
        - BrokerAuth: []
      parameters:
        - in: path
          name: loanId
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [source_category]
              properties:
                source_category:
                  type: string
                  nullable: true
                  enum:
                    - current_client_referral
                    - past_client
                    - past_client_referral
                    - personal_friend
                    - realtor
                    - advertisement
                    - business_partner
                    - builder
                    - other
      responses:
        "200":
          description: Source category updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessResponse" }

  /loans/{loanId}/details:
    patch:
      tags: [Loans]
      summary: Update editable loan application fields
      description: >
        Updates one or more loan detail fields (financial, property, terms,
        applicant, notes). Accessible to the assigned broker, partner broker,
        admin, or superadmin.
      security:
        - BrokerAuth: []
      parameters:
        - in: path
          name: loanId
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                loan_type:
                  type: string
                  enum: [purchase, refinance]
                loan_amount:
                  type: number
                  nullable: true
                property_value:
                  type: number
                  nullable: true
                property_address:
                  type: string
                  nullable: true
                property_city:
                  type: string
                  nullable: true
                property_state:
                  type: string
                  nullable: true
                property_zip:
                  type: string
                  nullable: true
                property_type:
                  type: string
                  nullable: true
                  enum:
                    [
                      single_family,
                      condo,
                      multi_family,
                      commercial,
                      land,
                      other,
                    ]
                down_payment:
                  type: number
                  nullable: true
                loan_purpose:
                  type: string
                  nullable: true
                estimated_close_date:
                  type: string
                  format: date
                  nullable: true
                interest_rate:
                  type: number
                  nullable: true
                loan_term_months:
                  type: integer
                  nullable: true
                priority:
                  type: string
                  enum: [low, medium, high, urgent]
                  nullable: true
                notes:
                  type: string
                  nullable: true
                citizenship_status:
                  type: string
                  nullable: true
                  enum: [us_citizen, permanent_resident, non_resident, other]
                employment_status:
                  type: string
                  nullable: true
                  enum:
                    [
                      employed,
                      self_employed,
                      unemployed,
                      retired,
                      retired_with_pension,
                    ]
                employer_name:
                  type: string
                  nullable: true
                years_employed:
                  type: string
                  nullable: true
      responses:
        "200":
          description: Loan details updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessResponse" }
        "400":
          description: Validation error or no fields provided
        "403":
          description: Access denied
        "404":
          description: Loan not found

  /loans/{loanId}/export-mismo:
    get:
      tags: [Loans]
      summary: Export loan as MISMO 3.4 XML
      security:
        - BrokerAuth: []
      parameters:
        - in: path
          name: loanId
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: MISMO XML file
          content:
            application/xml:
              schema:
                type: string

  # ── Pre-Approval ──────────────────────────────────────────────────────────────
  /loans/{loanId}/pre-approval-letter:
    get:
      tags: [Pre-Approval]
      summary: Get pre-approval letter for a loan
      security:
        - BrokerAuth: []
      parameters:
        - in: path
          name: loanId
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Pre-approval letter data
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      letter: { type: object }
        "404":
          description: No letter found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
    post:
      tags: [Pre-Approval]
      summary: Create pre-approval letter
      security:
        - BrokerAuth: []
      parameters:
        - in: path
          name: loanId
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Pre-approval letter fields
      responses:
        "201":
          description: Letter created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessResponse" }
    put:
      tags: [Pre-Approval]
      summary: Update pre-approval letter
      security:
        - BrokerAuth: []
      parameters:
        - in: path
          name: loanId
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Fields to update
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessResponse" }
    delete:
      tags: [Pre-Approval]
      summary: Delete pre-approval letter
      security:
        - BrokerAuth: []
      parameters:
        - in: path
          name: loanId
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessResponse" }

  /loans/{loanId}/pre-approval-letter/send-email:
    post:
      tags: [Pre-Approval]
      summary: Email the pre-approval letter to the client
      security:
        - BrokerAuth: []
      parameters:
        - in: path
          name: loanId
          required: true
          schema: { type: integer }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                recipient_email: { type: string, format: email }
      responses:
        "200":
          description: Email sent
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessResponse" }

  # ── Public Apply ──────────────────────────────────────────────────────────────
  /apply:
    post:
      tags: [Public]
      summary: Submit a loan application from the public wizard
      description: Creates a client account (if new) and a loan application. No auth required.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [first_name, last_name, email, loan_type, loan_amount]
              properties:
                first_name: { type: string }
                last_name: { type: string }
                email: { type: string, format: email }
                phone: { type: string }
                loan_type: { type: string }
                loan_amount: { type: number }
                property_value: { type: number }
                property_address: { type: string }
                citizenship_status: { type: string }
                broker_token:
                  type: string
                  description: Optional — pre-assigns a specific broker's share link token
                draft_id:
                  type: integer
                  description: Optional — if provided, promotes the existing draft application instead of creating a new record (prevents duplicates)
      responses:
        "201":
          description: Application submitted
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      application_id: { type: integer }
                      client_id: { type: integer }
        "400":
          description: Validation error
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /apply/draft:
    post:
      tags: [Public]
      summary: Save or update a wizard draft application
      description: >
        Creates or updates a draft loan application from the public wizard.
        Minimum required: first_name, last_name, email.
        If draft_id is supplied and matches an existing draft for this client it performs an UPDATE,
        otherwise a new draft record is inserted. No authentication required.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [first_name, last_name, email]
              properties:
                draft_id:
                  {
                    type: integer,
                    description: "ID of an existing draft to update",
                  }
                first_name: { type: string }
                last_name: { type: string }
                email: { type: string, format: email }
                phone: { type: string }
                address_street: { type: string }
                address_city: { type: string }
                address_state: { type: string }
                address_zip: { type: string }
                loan_type: { type: string }
                property_value: { type: number }
                down_payment: { type: number }
                property_type: { type: string }
                property_address: { type: string }
                property_city: { type: string }
                property_state: { type: string }
                property_zip: { type: string }
                loan_purpose: { type: string }
                citizenship_status: { type: string }
                broker_token: { type: string }
                wizard_step:
                  { type: integer, description: "Current wizard step (1-5)" }
      responses:
        "200":
          description: Draft saved
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      draft_id: { type: integer }
                      application_number: { type: string }
        "400":
          description: Validation error
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  # ── Public Broker Info ────────────────────────────────────────────────────────
  /public/broker/{token}:
    get:
      tags: [Public]
      summary: Get public broker info by share token
      description: Used by the application wizard to pre-load the referring broker's info.
      parameters:
        - in: path
          name: token
          required: true
          schema: { type: string }
          description: Broker's `public_token` UUID
      responses:
        "200":
          description: Public broker profile
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      broker:
                        type: object
                        properties:
                          id: { type: integer }
                          first_name: { type: string }
                          last_name: { type: string }
                          avatar_url: { type: string, nullable: true }
        "404":
          description: Broker not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  # ── Clients ────────────────────────────────────────────────────────────────────
  /clients:
    get:
      tags: [Clients]
      summary: List all clients
      security:
        - BrokerAuth: []
      parameters:
        - in: query
          name: search
          schema: { type: string }
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, default: 20 }
      responses:
        "200":
          description: Client list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      clients:
                        type: array
                        items: { $ref: "#/components/schemas/ClientInfo" }
                      total: { type: integer }
    post:
      tags: [Clients]
      summary: Create a new client profile
      security:
        - BrokerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [first_name, last_name]
              properties:
                first_name: { type: string }
                middle_name: { type: string }
                last_name: { type: string }
                email: { type: string, format: email }
                phone: { type: string }
                address_street: { type: string }
                address_unit: { type: string }
                address_city: { type: string }
                address_state: { type: string }
                address_zip: { type: string }
      responses:
        "201":
          description: Client created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      client: { $ref: "#/components/schemas/ClientInfo" }
        "400":
          description: Missing required fields
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "409":
          description: Email already exists
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /clients/{clientId}:
    delete:
      tags: [Clients]
      summary: Delete a client record
      security:
        - BrokerAuth: []
      parameters:
        - in: path
          name: clientId
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessResponse" }
    put:
      tags: [Clients]
      summary: Update client profile fields
      security:
        - BrokerAuth: []
      parameters:
        - in: path
          name: clientId
          required: true
          schema: { type: integer }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                first_name: { type: string }
                last_name: { type: string }
                phone: { type: string }
                alternate_phone: { type: string }
                date_of_birth: { type: string, format: date }
                address_street: { type: string }
                address_city: { type: string }
                address_state: { type: string }
                address_zip: { type: string }
                employment_status: { type: string }
                income_type:
                  {
                    type: string,
                    enum: [W-2, 1099, Self-Employed, Investor, Mixed],
                  }
                annual_income: { type: number }
                credit_score: { type: integer }
                citizenship_status:
                  {
                    type: string,
                    enum: [us_citizen, permanent_resident, non_resident, other],
                  }
                source: { type: string }
      responses:
        "200":
          description: Updated client

  /clients/{clientId}/profile:
    get:
      tags: [Clients]
      summary: Get full client profile with loans, conversations, and activity
      security:
        - BrokerAuth: []
      parameters:
        - in: path
          name: clientId
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Full client profile
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  client:
                    type: object
                    properties:
                      id: { type: integer }
                      first_name: { type: string }
                      last_name: { type: string }
                      email: { type: string }
                      phone: { type: string }
                      alternate_phone: { type: string }
                      date_of_birth: { type: string }
                      address_street: { type: string }
                      address_city: { type: string }
                      address_state: { type: string }
                      address_zip: { type: string }
                      employment_status: { type: string }
                      income_type: { type: string }
                      annual_income: { type: number }
                      credit_score: { type: integer }
                      citizenship_status: { type: string }
                      status: { type: string }
                      source: { type: string }
                      created_at: { type: string }
                      assigned_broker: { type: object }
                  loans: { type: array, items: { type: object } }
                  conversations: { type: array, items: { type: object } }
                  communications: { type: array, items: { type: object } }

  # ── Voice / Calling ──────────────────────────────────────────────────────────
  /voice/token:
    post:
      tags: [Voice]
      summary: Generate Twilio Access Token for browser Voice SDK
      security:
        - BrokerAuth: []
      responses:
        "200":
          description: Access token
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  token: { type: string }

  /voice/twiml:
    post:
      tags: [Voice]
      summary: TwiML webhook called by Twilio to route outbound calls
      description: No authentication required — called by Twilio servers
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                To: { type: string, description: Destination phone number }
                CallSid: { type: string }
      responses:
        "200":
          description: TwiML response
          content:
            text/xml:
              schema: { type: string }

  /voice/incoming:
    post:
      tags: [Voice]
      summary: TwiML webhook for inbound calls (Twilio → server)
      description: |
        Called by Twilio when an external caller dials a configured number.
        Routes simultaneously to all available (voice_available=1) brokers.
        Falls back to the assigned broker or first active broker if none is available.
        No authentication required — called by Twilio servers.
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                From: { type: string, description: Caller's phone number }
                To:
                  { type: string, description: Twilio number that was dialled }
                CallSid: { type: string }
      responses:
        "200":
          description: TwiML response
          content:
            text/xml:
              schema: { type: string }

  /voice/availability:
    post:
      tags: [Voice]
      summary: Update broker voice availability (online/offline toggle)
      description: |
        Called by the CRM frontend when the banker toggles Available / Unavailable.
        Updates voice_available on the brokers table so inbound call routing
        can ring only the bankers who are currently online.
      security:
        - BrokerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [available]
              properties:
                available:
                  type: boolean
                  description: true = broker is online and can receive inbound calls
      responses:
        "200":
          description: Availability updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  available: { type: boolean }

  /voice/voicemail-settings:
    get:
      tags: [Voice]
      summary: Get voicemail overrides for the authenticated broker plus tenant defaults
      security:
        - BrokerAuth: []
      responses:
        "200":
          description: Voicemail settings
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  broker:
                    type: object
                    properties:
                      voicemail_enabled:
                        type: boolean
                        nullable: true
                        description: null = inherit tenant default
                      voicemail_greeting_text: { type: string, nullable: true }
                      voicemail_greeting_url: { type: string, nullable: true }
                      has_personal_line: { type: boolean }
                  tenant:
                    type: object
                    properties:
                      voicemail_enabled: { type: boolean }
                      voicemail_greeting_text: { type: string, nullable: true }
                      voicemail_greeting_url: { type: string, nullable: true }
                      voicemail_max_seconds: { type: integer }
                      voicemail_transcribe: { type: boolean }
    put:
      tags: [Voice]
      summary: Update the authenticated broker's voicemail overrides
      description: Pass null on any field to clear the override and inherit the tenant default.
      security:
        - BrokerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                enabled: { type: boolean, nullable: true }
                greeting_text: { type: string, nullable: true }
                greeting_url: { type: string, nullable: true }
      responses:
        "200":
          description: Saved
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessResponse" }

  /voice/voicemail-settings/tenant:
    put:
      tags: [Voice]
      summary: Update tenant-level voicemail defaults (admin only)
      security:
        - BrokerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                enabled: { type: boolean }
                greeting_text: { type: string, nullable: true }
                greeting_url: { type: string, nullable: true }
                max_seconds: { type: integer, minimum: 10, maximum: 600 }
                transcribe: { type: boolean }
      responses:
        "200":
          description: Saved
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessResponse" }
        "403":
          description: Admin access required

  /voice/voicemail-complete:
    post:
      tags: [Voice]
      summary: TwiML callback fired by Twilio when caller finishes recording a voicemail
      description: No authentication required — called by Twilio servers.
      responses:
        "200":
          description: TwiML goodbye response
          content:
            text/xml:
              schema: { type: string }

  /voice/voicemail-recording:
    post:
      tags: [Voice]
      summary: Twilio recordingStatusCallback for the voicemail Record verb
      description: |
        Inserts a new communications row with is_voicemail = 1 and broadcasts
        an Ably event. No authentication required — called by Twilio servers.
      responses:
        "204":
          description: Recording stored

  /voice/voicemail-transcription:
    post:
      tags: [Voice]
      summary: Twilio transcribeCallback for voicemail audio
      description: |
        Patches the matching voicemail communications row with the transcript.
        No authentication required — called by Twilio servers.
      responses:
        "204":
          description: Transcription saved

  /voice/phone-numbers:
    get:
      tags: [Voice]
      summary: List Twilio phone numbers with webhook status and broker assignments
    get:
      tags: [Voice]
      summary: List Twilio phone numbers with webhook status and broker assignments
      security:
        - BrokerAuth: []
      responses:
        "200":
          description: Phone numbers list with assignment info
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  incomingUrl: { type: string }
                  numbers:
                    type: array
                    items:
                      type: object
                      properties:
                        sid: { type: string }
                        phoneNumber: { type: string }
                        friendlyName: { type: string }
                        voiceUrl: { type: string }
                        configured: { type: boolean }
                        capabilities:
                          type: object
                          properties:
                            voice: { type: boolean }
                            sms: { type: boolean }
                            mms: { type: boolean }
                        assignedBrokerId: { type: integer, nullable: true }
                        assignedBrokerName: { type: string, nullable: true }
                  brokers:
                    type: array
                    description: Active brokers for the assign dropdown
                    items:
                      type: object
                      properties:
                        id: { type: integer }
                        name: { type: string }

  /voice/phone-numbers/{sid}/configure:
    post:
      tags: [Voice]
      summary: Point a Twilio number's voice webhook to this portal
      security:
        - BrokerAuth: []
      parameters:
        - in: path
          name: sid
          required: true
          schema: { type: string }
          description: Twilio IncomingPhoneNumber SID, or "all" to configure every number
      responses:
        "200":
          description: Webhook updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessResponse" }

  /voice/phone-numbers/{sid}/assign:
    post:
      tags: [Voice]
      summary: Assign (or unassign) a Twilio phone number to a specific mortgage banker
      description: |
        Sets twilio_phone_sid and twilio_caller_id on the broker row.
        The assigned broker rings first on inbound calls and their number appears as
        caller ID on outbound calls. Pass brokerId: null to unassign.
      security:
        - BrokerAuth: []
      parameters:
        - in: path
          name: sid
          required: true
          schema: { type: string }
          description: Twilio IncomingPhoneNumber SID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [brokerId]
              properties:
                brokerId:
                  type: integer
                  nullable: true
                  description: Broker ID to assign, or null to unassign
      responses:
        "200":
          description: Assignment saved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  sid: { type: string }
                  brokerId: { type: integer, nullable: true }
                  callerIdE164: { type: string }

  /voice/log:
    post:
      tags: [Voice]
      summary: Log a completed call to the communications table
      security:
        - BrokerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [phone]
              properties:
                phone: { type: string }
                client_id: { type: integer }
                application_id: { type: integer }
                duration: { type: integer, description: Duration in seconds }
                call_status: { type: string }
                call_sid: { type: string }
                client_name: { type: string }
                direction:
                  type: string
                  enum: [inbound, outbound]
                  description: Call direction (defaults to outbound)
      responses:
        "200":
          description: Call logged
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessResponse" }

